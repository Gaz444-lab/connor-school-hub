<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e3a8a" />
  <meta name="description" content="Connor's School Hub — Grade 10 Fish Hoek High. Homework, grades, timetable, study & daily planner." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Connor's School Hub · FHHS Gr 10</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎒</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon" aria-hidden="true">🎒</span>
        <div class="brand-text">
          <h1 id="app-title">Connor's School Hub</h1>
          <p class="subtitle" id="sidebar-school">Fish Hoek High · Gr 10</p>
        </div>
      </div>

      <nav class="nav" id="main-nav" aria-label="Main">
        <button type="button" class="nav-btn active" data-view="today">
          <span class="nav-emoji">☀️</span><span>Today</span>
        </button>
        <button type="button" class="nav-btn" data-view="agenda">
          <span class="nav-emoji">📅</span><span>Agenda</span>
        </button>
        <button type="button" class="nav-btn" data-view="work">
          <span class="nav-emoji">📝</span><span>Work</span>
        </button>
        <button type="button" class="nav-btn" data-view="assessments">
          <span class="nav-emoji">📌</span><span>Assessments</span>
        </button>
        <button type="button" class="nav-btn" data-view="grades">
          <span class="nav-emoji">📊</span><span>Grades</span>
        </button>
        <button type="button" class="nav-btn" data-view="study">
          <span class="nav-emoji">⏱️</span><span>Study</span>
        </button>
        <button type="button" class="nav-btn" data-view="timetable">
          <span class="nav-emoji">🗓️</span><span>Timetable</span>
        </button>
        <button type="button" class="nav-btn" data-view="routines">
          <span class="nav-emoji">✅</span><span>Routines</span>
        </button>
        <button type="button" class="nav-btn" data-view="notes">
          <span class="nav-emoji">📓</span><span>Notes</span>
        </button>
        <button type="button" class="nav-btn" data-view="goals">
          <span class="nav-emoji">🎯</span><span>Goals</span>
        </button>
        <button type="button" class="nav-btn" data-view="links">
          <span class="nav-emoji">🔗</span><span>Links</span>
        </button>
        <button type="button" class="nav-btn" data-view="memories">
          <span class="nav-emoji">📸</span><span>Memories</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button type="button" class="nav-btn" data-view="settings">
          <span class="nav-emoji">⚙️</span><span>Settings</span>
        </button>
      </div>
    </aside>

    <div class="content">
      <header class="topbar">
        <div class="brand-text topbar-meta">
          <p class="subtitle" id="date-line"></p>
        </div>
        <div class="topbar-actions">
          <button type="button" class="icon-btn" id="quick-add" title="Quick add" aria-label="Quick add">＋</button>
          <button type="button" class="icon-btn" id="theme-toggle" title="Dark mode" aria-label="Toggle theme">🌙</button>
        </div>
      </header>

      <main id="main" class="main"></main>
    </div>
  </div>

  <div id="modal-root" class="modal-root" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Edit</h2>
        <button type="button" class="icon-btn" data-close-modal aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
